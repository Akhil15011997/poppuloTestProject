version: '3.8'

services:
  # Main E2E test service - UI and UI+API tests only
  # CI=true automatically excludes @apiOnly, @performance, @playwrightMCP, @mcp tags
  e2e-tests:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PROFILE=${PROFILE:-local:@smoke:chromeHeadless}
      - CI=true
    volumes:
      - ./output:/app/output
      - ./allure-results:/app/allure-reports
    # Use host network to fix DNS/connectivity issues
    network_mode: host
    command: sh -c "pnpm e2e $$PROFILE"

  # # Parallel execution with workers (commented out - use for CI)
  # e2e-tests-parallel:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   environment:
  #     - PROFILE=${PROFILE:-local:@smoke:chromeHeadless}
  #     - WORKERS=${WORKERS:-4}
  #     - CI=true
  #   volumes:
  #     - ./output:/app/output
  #     - ./allure-results:/app/allure-results
  #   network_mode: host
  #   command: sh -c "pnpm e2e:parallel $$PROFILE $$WORKERS"

  # # Firefox headless (commented out - only Chromium installed)
  # e2e-tests-firefox:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   environment:
  #     - PROFILE=local:@smoke:firefoxHeadless
  #     - CI=true
  #   volumes:
  #     - ./output:/app/output
  #   command: sh -c "pnpm e2e $$PROFILE"

  # Allure report server
 # Allure report server - serves the generated HTML report
  allure-report:
    image: nginx:alpine
    ports:
      - "5050:80"
    volumes:
      - ./allure-report:/usr/share/nginx/html:ro
