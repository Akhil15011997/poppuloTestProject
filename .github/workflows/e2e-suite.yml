name: E2E Test Suite

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - staging
          - production
      suite:
        description: 'Test suite/tag to run (e.g., @smoke, @auth, @mobile)'
        required: true
        default: '@smoke'
        type: string
      browser:
        description: 'Browser to use'
        required: true
        default: 'chromeHeadless'
        type: choice
        options:
          - chromeHeadless
          - chrome
          - firefoxHeadless
          - firefox
          - webkit
          - webkitHeadless
          - mobileChromeHeadless
          - mobileSafariHeadless
          - tabletHeadless
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      suite:
        required: true
        type: string
      browser:
        required: false
        type: string
        default: 'chromeHeadless'

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.1.0'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  e2e-tests:
    name: E2E Tests - ${{ inputs.suite }} (${{ inputs.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: e2e/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: e2e
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: e2e
        run: pnpm exec playwright install --with-deps

      - name: Run E2E tests
        working-directory: e2e
        env:
          mailgun-api-key: ${{ secrets.MAILGUN_SENDING_API_KEY }}
          mailgun-domain: ${{ secrets.MAILGUN_DOMAIN }}
          mailgun-from-email: ${{ secrets.MAILGUN_FROM_EMAIL }}
          mailgun-mock-mode: ${{ secrets.MAILGUN_SENDING_API_KEY != '' && 'false' || 'true' }}
        run: |
          echo "Running: pnpm e2e ${{ inputs.environment }}:${{ inputs.suite }}:${{ inputs.browser }}"
          pnpm e2e ${{ inputs.environment }}:${{ inputs.suite }}:${{ inputs.browser }} || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.suite }}-${{ inputs.browser }}
          path: |
            e2e/output/
            e2e/allure-results/
          retention-days: 30

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Install Allure CLI
        if: always()
        run: |
          curl -o allure-2.32.0.tgz -Ls https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.32.0/allure-commandline-2.32.0.tgz
          tar -zxvf allure-2.32.0.tgz
          echo "$PWD/allure-2.32.0/bin" >> $GITHUB_PATH

      - name: Copy Allure history
        if: always()
        run: |
          mkdir -p allure-history
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history e2e/allure-results/history || true
          fi

      - name: Publish Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Generate test summary
        if: always()
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | ${{ inputs.suite }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Browser | ${{ inputs.browser }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "👉 **[Click here to view the Allure Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)**" >> $GITHUB_STEP_SUMMARY
