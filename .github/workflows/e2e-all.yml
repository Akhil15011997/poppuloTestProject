name: E2E All Suites

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - staging
          - production
      browser:
        description: 'Browser to use'
        required: true
        default: 'chromeHeadless'
        type: choice
        options:
          - chromeHeadless
          - chrome
          - firefoxHeadless
          - firefox
          - webkit
      workers:
        description: 'Number of parallel workers per suite'
        required: false
        default: '4'
        type: string
  push:
    branches:
      - main
    paths:
      - 'e2e/**'
      - '.github/workflows/e2e-*.yml'

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.1.0'
  DOCKER_IMAGE: ghcr.io/akhil15011997/assessmentproject/e2e-tests:latest

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  determine-suites:
    name: Determine Test Suites
    runs-on: ubuntu-latest
    outputs:
      suites: ${{ steps.get-suites.outputs.suites }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get test suites
        id: get-suites
        run: |
          # Define suites to run in parallel
          SUITES='["@auth", "@products", "@cart", "@api"]'
          echo "suites=$SUITES" >> $GITHUB_OUTPUT
          echo "Running suites: $SUITES"

  run-suites:
    name: Run Suite - ${{ matrix.suite }}
    needs: determine-suites
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        suite: ${{ fromJson(needs.determine-suites.outputs.suites) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run E2E tests - ${{ matrix.suite }}
        uses: ./.github/actions/run-e2e-tests
        with:
          environment: ${{ inputs.environment || 'local' }}
          suite: ${{ matrix.suite }}
          browser: ${{ inputs.browser || 'chromeHeadless' }}
          use-docker: 'true'
          docker-image: ${{ env.DOCKER_IMAGE }}
          mailgun-api-key: ${{ secrets.MAILGUN_SENDING_API_KEY }}
          mailgun-domain: ${{ secrets.MAILGUN_DOMAIN }}
          mailgun-from-email: ${{ secrets.MAILGUN_FROM_EMAIL }}
          mailgun-mock-mode: ${{ secrets.MAILGUN_SENDING_API_KEY != '' && 'false' || 'true' }}

  # Cross-browser tests disabled - Docker image only has Chromium
  # Uncomment and update Dockerfile to include Firefox/WebKit if needed
  # cross-browser:
  #   name: Cross Browser - ${{ matrix.browser }}
  #   needs: determine-suites
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 60
  #   strategy:
  #     fail-fast: false
  #     matrix:
  #       browser: [chromeHeadless, firefoxHeadless, webkitHeadless]
  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v4
  #     - name: Run smoke tests - ${{ matrix.browser }}
  #       uses: ./.github/actions/run-e2e-tests
  #       with:
  #         environment: ${{ inputs.environment || 'local' }}
  #         suite: '@smoke'
  #         browser: ${{ matrix.browser }}
  #         use-docker: 'false'  # Direct execution for cross-browser

  aggregate-results:
    name: Aggregate Results & Publish Allure
    needs: [run-suites]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results

      - name: Merge Allure results
        run: |
          mkdir -p merged-allure-results
          # Allure results are in output/allure-results inside each artifact
          find all-results -path "*/allure-results/*" -type f -exec cp {} merged-allure-results/ \; 2>/dev/null || true
          echo "Merged Allure results:"
          ls -la merged-allure-results/ || echo "No results found"

      - name: Get Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Install Allure CLI
        if: always()
        run: |
          curl -o allure-2.32.0.tgz -Ls https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.32.0/allure-commandline-2.32.0.tgz
          tar -zxvf allure-2.32.0.tgz
          echo "$PWD/allure-2.32.0/bin" >> $GITHUB_PATH

      - name: Copy Allure history
        if: always()
        run: |
          mkdir -p allure-history
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history e2e/allure-results/history || true
          fi

      - name: Publish Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Generate summary
        run: |
          echo "## E2E Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment || 'local' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Browser | ${{ inputs.browser || 'chromeHeadless' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Workers | ${{ inputs.workers || '4' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          ls -la all-results/ >> $GITHUB_STEP_SUMMARY || echo "No artifacts found"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "👉 **[Click here to view the Allure Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)**" >> $GITHUB_STEP_SUMMARY
